<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Play Online</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <header class="global-header">
            <div class="header-controls">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme" title="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.22" x2="5.64" y2="17.78"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button id="sound-toggle" class="icon-btn" aria-label="Toggle Sound" title="Toggle Sound">
                    <svg class="sound-on" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <svg class="sound-off" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                </button>
            </div>
        </header>

        <main class="main-content">
            <section id="home-screen" class="view-screen card-glass">
                <h1 class="main-title">Tic Tac Toe</h1>
                <div class="menu-buttons">
                    <button id="btn-single" class="btn btn-primary">Single Player</button>
                    <button id="btn-multi" class="btn btn-secondary">Multiplayer</button>
                    <button id="btn-how" class="btn btn-text">How To Play</button>
                    <button id="btn-about" class="btn btn-text">About</button>
                </div>
            </section>

            <section id="setup-screen" class="view-screen card-glass hidden">
                <div style="width: 100%; text-align: left; margin-bottom: 20px;">
                    <button id="btn-setup-back" class="btn btn-icon-text" aria-label="Back to home">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Home
                    </button>
                </div>
                <h2 id="setup-title" class="main-title" style="font-size: 2rem;">Game Setup</h2>
                
                <div class="setup-form">
                    <div id="player-x-input-group" class="input-group">
                        <label id="label-player-x-input" for="input-player-x">Player X Name</label>
                        <input type="text" id="input-player-x" class="setup-input" placeholder="Enter Player X Name" maxLength="15">
                    </div>
                    
                    <div id="player-o-input-group" class="input-group">
                        <label id="label-player-o-input" for="input-player-o">Player O Name</label>
                        <input type="text" id="input-player-o" class="setup-input" placeholder="Enter Player O Name" maxLength="15">
                    </div>
                    
                    <div id="setup-difficulty-group" class="input-group">
                        <label for="setup-difficulty-select">Difficulty Level</label>
                        <select id="setup-difficulty-select" class="dropdown-large">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard (Minimax)</option>
                        </select>
                    </div>
                </div>
                
                <button id="btn-start-game" class="btn btn-primary">Start Match</button>
            </section>

            <section id="game-screen" class="view-screen card-glass hidden">
                <div class="game-header">
                    <button id="btn-back" class="btn btn-icon-text" aria-label="Back to home">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Home
                    </button>
                    <div id="difficulty-selector-container" class="hidden">
                        <select id="difficulty-select" class="dropdown">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard (Minimax)</option>
                        </select>
                    </div>
                    <div id="timer-display" class="timer-badge">00:00</div>
                </div>

                <div id="game-status" class="status-banner" aria-live="polite">Player X Turn</div>

                <div class="scoreboard">
                    <div class="score-card player-x-card active-turn">
                        <span id="label-x" class="score-label">Player X</span>
                        <span id="score-x" class="score-value">0</span>
                    </div>
                    <div class="score-card draw-card">
                        <span class="score-label">Draws</span>
                        <span id="score-draws" class="score-value">0</span>
                    </div>
                    <div class="score-card player-o-card">
                        <span id="label-o" class="score-label">Player O</span>
                        <span id="score-o" class="score-value">0</span>
                    </div>
                </div>

                <div class="meta-stats">
                    <span>Total Matches: <strong id="stat-total-games">0</strong></span>
                </div>

                <div class="board-wrapper">
                    <div id="game-board" class="board" role="grid" aria-label="Tic Tac Toe Board">
                        <button class="cell" data-index="0" role="gridcell"></button>
                        <button class="cell" data-index="1" role="gridcell"></button>
                        <button class="cell" data-index="2" role="gridcell"></button>
                        <button class="cell" data-index="3" role="gridcell"></button>
                        <button class="cell" data-index="4" role="gridcell"></button>
                        <button class="cell" data-index="5" role="gridcell"></button>
                        <button class="cell" data-index="6" role="gridcell"></button>
                        <button class="cell" data-index="7" role="gridcell"></button>
                        <button class="cell" data-index="8" role="gridcell"></button>
                    </div>
                </div>

                <div class="control-actions">
                    <button id="btn-undo" class="btn btn-secondary" disabled>Undo Move</button>
                    <button id="btn-restart" class="btn btn-secondary">Restart Match</button>
                    <button id="btn-reset-scores" class="btn btn-danger">Reset All Scores</button>
                </div>

                <div id="match-overlay" class="overlay hidden">
                    <div class="overlay-card">
                        <h2 id="overlay-result-text">Player X Wins!</h2>
                        <p id="motivational-quote" class="quote-text">"Consistency beats talent."</p>
                        <button id="btn-play-again" class="btn btn-primary">Play Again</button>
                    </div>
                </div>

                <div class="history-container">
                    <h3>Move Log / History</h3>
                    <div id="history-log" class="history-log">
                        <p class="empty-log-msg">No moves logged yet.</p>
                    </div>
                </div>
            </section>

            <section id="info-screen" class="view-screen card-glass hidden">
                <div style="width: 100%; text-align: left; margin-bottom: 20px;">
                    <button id="btn-info-back" class="btn btn-icon-text">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Back
                    </button>
                </div>
                <div id="info-content" class="info-content-body"></div>
            </section>
        </main>

        <footer class="global-footer">
            <p>Made with ❤️ using HTML CSS JavaScript</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
